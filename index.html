<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План питания</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>План Питания</h1>
        <p class="user-info">Для пользователя: Адиль</p>
    </header>

    <main class="container">
        <!-- Завтрак -->
        <section class="meal-card morning">
            <span class="time-label">08:00 • Утро</span>
            <div class="img-wrapper">
                <img src="https://cdn.tveda.ru/thumbs/bab/bab3a1d5fd1520203899b3a339953251/11798b9db096fdadc0b40bf105679217.jpg" alt="Омлет">
            </div>
            <h2>Омлет с овощами</h2>
        </section>

        <!-- Обед -->
        <section class="meal-card day">
            <span class="time-label">13:00 • Обед</span>
            <div class="img-wrapper">
                <img src="https://www.russianfood.com/dycontent/images_upl/579/big_578365.jpg" alt="Обед">
            </div>
            <h2>Фарш с перцем и рисом</h2>
        </section>

        <!-- Полдник -->
        <section class="meal-card evening">
            <span class="time-label">15:00 • Полдник</span>
            <div class="img-wrapper">
                <img src="https://lifehacker.ru/wp-content/uploads/2022/03/731_1647433867-scaled.jpg" alt="Полдник">
            </div>
            <h2>Куриное филе с овощами</h2>
        </section>

        <!-- Ужин -->
        <section class="meal-card night">
            <span class="time-label">18:00 • Ужин</span>
            <div class="img-wrapper">
                <img src="https://img.povar.ru/mobile/ba/ca/03/bc/tvorog_s_bananom-807643.JPG" alt="Ужин">
            </div>
            <h2>Творог с бананом</h2>
        </section>
        <button id="startBtn">Запустить уведомления</button>
        <p id="statusMessage"></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
